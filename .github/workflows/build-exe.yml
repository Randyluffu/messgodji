name: Build Godji Messenger EXE

# Запускается вручную (кнопка "Run workflow" во вкладке Actions на GitHub)
# и при каждом пуше в ветку main/master — не нужен ни Windows, ни Python
# на твоём компьютере, всё собирается в облаке GitHub на настоящей Windows.
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'messenger_admin_app.py'
      - 'messenger_client_app.py'
      - 'requirements.txt'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Сборка админского exe
        run: pyinstaller --noconsole --onefile --name GodjiMessengerAdmin messenger_admin_app.py

      - name: Сборка клиентского exe
        run: pyinstaller --noconsole --onefile --name GodjiMessengerClient messenger_client_app.py

      - name: Публикация готовых exe
        uses: actions/upload-artifact@v4
        with:
          name: godji-messenger-exe
          path: |
            dist/GodjiMessengerAdmin.exe
            dist/GodjiMessengerClient.exe
          retention-days: 30
