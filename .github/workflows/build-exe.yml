name: Build Godji Messenger EXE

# Запускается вручную (кнопка "Run workflow" во вкладке Actions на GitHub)
# и при каждом пуше файлов приложений — Windows и Python не нужны у тебя,
# всё собирается в облаке GitHub на настоящей Windows.
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'messenger_admin_app.py'
      - 'messenger_client_app.py'
      - 'generate_icons.py'
      - 'requirements.txt'

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Генерация иконок
        run: python generate_icons.py

      - name: Сборка админского exe
        run: pyinstaller --noconsole --onefile --icon=admin_icon.ico --name GodjiMessengerAdmin messenger_admin_app.py

      - name: Сборка клиентского exe
        run: pyinstaller --noconsole --onefile --icon=client_icon.ico --name GodjiMessengerClient messenger_client_app.py

      - name: Публикация готовых exe
        uses: actions/upload-artifact@v4
        with:
          name: godji-messenger-exe
          path: |
            dist/GodjiMessengerAdmin.exe
            dist/GodjiMessengerClient.exe
          retention-days: 30
